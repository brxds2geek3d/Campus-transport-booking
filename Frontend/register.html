<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Campus Transport</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <h2>Create Student Account</h2>
        <p>Enter your details to start booking trips.</p>
        
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="regName" placeholder="e.g. John Doe">
        </div>

        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" id="regEmail" placeholder="student@campus.ac.ke">
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="regPass" placeholder="••••••••">
        </div>

        <button onclick="handleRegister()" class="btn-primary">Sign Up</button>
        
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
